name: Add digital rules specification v0.1

on:
  push:
    branches:
      - docs/add-digital-rules-specification-v0.1

permissions:
  contents: write

jobs:
  assemble-document:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/add-digital-rules-specification-v0.1
          fetch-depth: 0

      - name: Assemble and validate document
        shell: bash
        run: |
          set -euo pipefail
          cat .github/drs-v0.1-payload/plain-*.md > docs/product/digital-rules-specification-v0.1.md
          echo "5885b3513b8d9a209b70eca76a691fcfd9536a4b6ff70d3cd1ae9f40f6e304ae  docs/product/digital-rules-specification-v0.1.md" | sha256sum --check --strict

      - name: Commit specification and remove staging files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/drs-v0.1-payload
          rm -f .github/workflows/add-digital-rules-specification-v0.1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/product/digital-rules-specification-v0.1.md .github
          git commit -m "docs: add digital rules specification v0.1"
          git push origin HEAD:docs/add-digital-rules-specification-v0.1
