name: Normalize NoteQuest product templates

on:
  push:
    branches:
      - docs/remove-ironsworn-template-wording
    paths:
      - .github/workflows/normalize-notequest-product-templates.yml

permissions:
  contents: write

jobs:
  normalize-templates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove Ironsworn-specific wording and examples
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('docs/product/templates')
          files = sorted(root.glob('*.md'))

          exact = {
              'Ironsworn Digital Companion': 'NoteQuest Digital Adaptation',
              'Prepared for the Ironsworn Project': 'Prepared for the NoteQuest Project',
              'Prepared for the Ironsworn project': 'Prepared for the NoteQuest Project',
              'The product remains a companion to tabletop play. It should reduce friction without replacing player interpretation, reproducing the full rulebook, or introducing unapproved content.': 'The product is a digital adaptation of NoteQuest. It should preserve the source game’s core decisions and tone without reproducing unapproved content or extending beyond agreed adaptation rights.',
              'Fiction-first': 'Source-faithful',
              'fiction-first': 'source-faithful',
              'Companion, not replacement': 'Faithful adaptation',
              'companion, not replacement': 'faithful adaptation',
              'Mechanics and prompts support interpretation rather than authoring mandatory narrative outcomes.': 'Mechanics and interfaces preserve the source rules rather than inventing unsupported gameplay outcomes.',
              'The product does not attempt to replace the complete tabletop experience or rulebook.': 'The product implements the approved digital scope without claiming rights to unapproved source-book content.',
              'User-authored campaign records are treated as valuable data.': 'Saved adventurers, dungeons, inventories, and Graveyard records are treated as valuable data.',
              'Do not add unapproved Ironsworn prose, move text, oracle text, asset text, artwork, icons, copied layouts, screenshots, or trade dress.': 'Do not add unapproved NoteQuest rules text, dungeon tables, item or monster descriptions, artwork, icons, copied layouts, screenshots, or trade dress.',
              'Do not add unapproved official Ironsworn prose, move text, oracle text, asset text, art, icons, screenshots, copied layout, or trade dress.': 'Do not add unapproved official NoteQuest rules text, dungeon tables, item or monster descriptions, art, icons, screenshots, copied layout, or trade dress.',
              'solo-campaign-depth-functional-requirements-addendum-v0.2.md': 'core-dungeon-loop-functional-requirements-addendum-v0.2.md',
              'Campaign and journal data may be irreplaceable.': 'Adventurer, dungeon, inventory, and Graveyard data may be irreplaceable.',
              "Slow or confusing flows defeat the companion's purpose.": "Slow or confusing flows defeat the product's purpose.",
              'Forced story outcomes undermine fiction-first play.': 'Invented rules or outcomes undermine source-faithful play.',
              'Preserve fiction-first play.': 'Preserve source-faithful play.',
              'No mandatory narrative interpretation is applied.': 'No unsupported rule outcome or source content is introduced.',
              'Momentum and progress calculations.': 'HP, armour, torch, damage, and dungeon-depth calculations.',
              'Oracle range lookup and invalid table data.': 'Dungeon-table lookup and invalid table data.',
              'Character / campaign state used by rules inputs.': 'Adventurer and dungeon state used by rules inputs.',
              'Roll, oracle, progress, and journal linkage.': 'Roll, room, combat, inventory, and event-log linkage.',
              'Session and campaign ownership.': 'Save-slot and adventure ownership.',
              'Standard character / campaign fixture': 'Standard adventurer / dungeon fixture',
              '| Campaign | {{CAMPAIGN_NAME}} |': '| Dungeon | {{DUNGEON_NAME}} |',
              '| Character | {{CHARACTER_NAME}} |': '| Adventurer | {{ADVENTURER_NAME}} |',
              '| Stats / resources | {{VALUES}} |': '| HP / armour / torches / coins | {{VALUES}} |',
              '| Momentum | {{VALUES}} |': '| Dungeon depth / current HP | {{VALUES}} |',
              '| Vows / tracks | {{VALUES}} |': '| Doors / rooms / monsters | {{VALUES}} |',
              '| Journal / history | {{VALUES}} |': '| Event log / Graveyard | {{VALUES}} |',
              'Minimum and maximum track values.': 'Minimum and maximum HP, armour, torch, coin, and inventory values.',
              'Partially filled progress.': 'Partially explored dungeons and damaged armour.',
              'Empty campaign / no active record.': 'Empty save slot / no active adventurer.',
              'Long names and long journal entries.': 'Long adventurer names and long event-log entries.',
              'Multiple campaigns and sessions.': 'Multiple save slots and expeditions.',
              'Large history fixture.': 'Large event-log and Graveyard fixture.',
              'Momentum burn': 'Torch expenditure',
              'momentum burn': 'torch expenditure',
              'Burn momentum': 'Spend a torch',
              'burn momentum': 'spend a torch',
              'Momentum track': 'Torch supply',
              'momentum track': 'torch supply',
              'Momentum value': 'Torch count',
              'momentum value': 'torch count',
              'Progress track': 'Dungeon progress',
              'progress track': 'dungeon progress',
              'Progress tracks': 'Dungeon progress',
              'progress tracks': 'dungeon progress',
              'Progress move': 'Boss encounter',
              'progress move': 'boss encounter',
              'Progress score': 'Dungeon depth',
              'progress score': 'dungeon depth',
              'Action die': 'Damage die',
              'action die': 'damage die',
              'Challenge dice': 'Table dice',
              'challenge dice': 'table dice',
              'Strong hit': 'Successful result',
              'strong hit': 'successful result',
              'Weak hit': 'Mixed result',
              'weak hit': 'mixed result',
              'move text': 'rules text',
              'Move text': 'Rules text',
              'move rules': 'action rules',
              'Move rules': 'Action rules',
              'move resolution': 'action resolution',
              'Move resolution': 'Action resolution',
              'move outcome': 'action outcome',
              'Move outcome': 'Action outcome',
              'move result': 'action result',
              'Move result': 'Action result',
              'move history': 'action history',
              'Move history': 'Action history',
              'move roller': 'action resolver',
              'Move roller': 'Action resolver',
              'selected move': 'selected action',
              'Selected move': 'Selected action',
              'move name': 'action name',
              'Move name': 'Action name',
              'move input': 'action input',
              'Move input': 'Action input',
              'move data': 'action data',
              'Move data': 'Action data',
              'move list': 'action list',
              'Move list': 'Action list',
              'move reference': 'action reference',
              'Move reference': 'Action reference',
              'move record': 'action record',
              'Move record': 'Action record',
              'move execution': 'action execution',
              'Move execution': 'Action execution',
              'move mechanic': 'action mechanic',
              'Move mechanic': 'Action mechanic',
              'asset card': 'equipment item',
              'Asset card': 'Equipment item',
              'asset cards': 'equipment items',
              'Asset cards': 'Equipment items',
              'Debilities': 'Status conditions',
              'debilities': 'status conditions',
              'Bonds': 'Dungeon links',
              'bonds': 'dungeon links',
              'Edge, Heart, Iron, Shadow, and Wits': 'HP, armour, torches, coins, and available hands',
              'Health, Spirit, and Supply': 'HP, armour durability, and torches',
              'health, spirit, and supply': 'HP, armour durability, and torches',
              'Harm and stress': 'Damage and resource loss',
              'harm and stress': 'damage and resource loss',
              'fictional positioning': 'game-state context',
              'Fictional positioning': 'Game-state context',
              'user-authored fiction': 'player-created notes',
              'User-authored fiction': 'Player-created notes',
          }

          regex_replacements = [
              (r'\bIronsworn\b', 'NoteQuest'),
              (r'\bDigital Companion\b', 'Digital Adaptation'),
              (r'\bCampaigns\b', 'Adventures'),
              (r'\bcampaigns\b', 'adventures'),
              (r'\bCampaign\b', 'Adventure'),
              (r'\bcampaign\b', 'adventure'),
              (r'\bJournals\b', 'Event Logs'),
              (r'\bjournals\b', 'event logs'),
              (r'\bJournal\b', 'Event Log'),
              (r'\bjournal\b', 'event log'),
              (r'\bMomentum\b', 'Torch Supply'),
              (r'\bmomentum\b', 'torch supply'),
              (r'\bVows\b', 'Dungeon Objectives'),
              (r'\bvows\b', 'dungeon objectives'),
              (r'\bVow\b', 'Dungeon Objective'),
              (r'\bvow\b', 'dungeon objective'),
              (r'\bOracles\b', 'Random Tables'),
              (r'\boracles\b', 'random tables'),
              (r'\bOracle\b', 'Random Table'),
              (r'\boracle\b', 'random table'),
              (r'\bMoves\b', 'Actions'),
              (r'\bmoves\b', 'actions'),
              (r'\bcompanion\b', 'adaptation'),
              (r'\bCompanion\b', 'Adaptation'),
              (r'\{\{CAMPAIGN_([A-Z0-9_]+)\}\}', r'{{ADVENTURE_\1}}'),
              (r'\{\{CHARACTER_([A-Z0-9_]+)\}\}', r'{{ADVENTURER_\1}}'),
              (r'\{\{MOVE_([A-Z0-9_]+)\}\}', r'{{ACTION_\1}}'),
              (r'\{\{ORACLE_([A-Z0-9_]+)\}\}', r'{{TABLE_\1}}'),
              (r'\{\{VOW_([A-Z0-9_]+)\}\}', r'{{OBJECTIVE_\1}}'),
              (r'\{\{MOMENTUM_([A-Z0-9_]+)\}\}', r'{{TORCH_\1}}'),
              (r'\bFR-MOVE-', 'FR-ACTION-'),
              (r'\bRE-MOVE-', 'RE-ACTION-'),
              (r'\bDM-MOVE-', 'DM-ACTION-'),
              (r'\bUX-MOVE-', 'UX-ACTION-'),
              (r'\bAC-MOVE-', 'AC-ACTION-'),
          ]

          for path in files:
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in exact.items():
                  text = text.replace(old, new)
              for pattern, replacement in regex_replacements:
                  text = re.sub(pattern, replacement, text)
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  print(f'updated {path}')

          banned = [
              r'\bIronsworn\b',
              r'\bDigital Companion\b',
              r'fiction-first',
              r'\bmomentum\b',
              r'\bvows?\b',
              r'\boracles?\b',
              r'progress tracks?',
              r'progress moves?',
              r'action die',
              r'challenge dice',
              r'strong hit',
              r'weak hit',
              r'move text',
              r'move rules',
              r'move resolution',
              r'move outcome',
              r'move result',
              r'move history',
              r'move roller',
              r'asset cards?',
              r'\bdebilities\b',
              r'\bbonds\b',
              r'\{\{CAMPAIGN_',
              r'\{\{MOVE_',
              r'\{\{ORACLE_',
              r'\{\{VOW_',
              r'\{\{MOMENTUM_',
          ]

          failures = []
          for path in files:
              for number, line in enumerate(path.read_text(encoding='utf-8').splitlines(), 1):
                  for pattern in banned:
                      if re.search(pattern, line, flags=re.IGNORECASE):
                          failures.append(f'{path}:{number}: {line}')
                          break

          if failures:
              print('Ironsworn-specific wording remains:')
              print('\n'.join(failures))
              raise SystemExit(1)
          PY

      - name: Remove temporary workflow and commit changes
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/normalize-notequest-product-templates.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "docs: remove Ironsworn wording from product templates"
          git push origin HEAD:docs/remove-ironsworn-template-wording
