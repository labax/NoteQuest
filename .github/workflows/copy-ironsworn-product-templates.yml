name: Copy Ironsworn product templates

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/copy-ironsworn-product-templates.yml

permissions:
  contents: write

jobs:
  copy-templates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out NoteQuest
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out Ironsworn templates
        uses: actions/checkout@v4
        with:
          repository: labax/ironsworn
          ref: main
          path: _ironsworn_source
          sparse-checkout: |
            docs/product/templates
          sparse-checkout-cone-mode: false

      - name: Copy templates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/product/templates
          cp -a _ironsworn_source/docs/product/templates/. docs/product/templates/
          rm -rf _ironsworn_source
          rm -f .github/workflows/copy-ironsworn-product-templates.yml

      - name: Commit copied files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "docs: copy product templates from ironsworn"
          git push origin HEAD:main
