name: Add internal documentation links

on:
  push:
    branches:
      - docs/add-internal-document-links

permissions:
  contents: write

jobs:
  add-internal-links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: docs/add-internal-document-links
          fetch-depth: 0

      - name: Add internal Markdown links only
        shell: bash
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import html
          import re
          import subprocess
          from collections import Counter, defaultdict
          from pathlib import Path

          ROOT = Path("docs/product")

          def strip_inline_markdown(text: str) -> str:
              previous = None
              while previous != text:
                  previous = text
                  text = re.sub(r'!\[([^\]]*)\]\([^)]*\)', r'\1', text)
                  text = re.sub(r'\[([^\]]+)\]\([^)]*\)', r'\1', text)
              text = re.sub(r'<[^>]+>', '', text)
              text = text.replace('`', '')
              text = re.sub(r'(?<!\\)[*_~]', '', text)
              text = re.sub(r'\\([\\`*{}\[\]()#+\-.!_>])', r'\1', text)
              return html.unescape(text).strip()

          def strip_all_links(text: str) -> str:
              previous = None
              while previous != text:
                  previous = text
                  text = re.sub(r'!\[([^\]]*)\]\([^)]*\)', r'\1', text)
                  text = re.sub(r'\[([^\]]+)\]\([^)]*\)', r'\1', text)
              return text

          def github_slug_base(text: str) -> str:
              text = strip_inline_markdown(text).lower()
              text = re.sub(r'[^\w\- ]', '', text, flags=re.UNICODE)
              text = re.sub(r'\s+', '-', text.strip())
              return text

          def heading_records(lines: list[str]):
              records = []
              slug_counts: defaultdict[str, int] = defaultdict(int)
              in_fence = False
              fence_char = None

              for index, line in enumerate(lines):
                  stripped = line.lstrip()
                  fence = re.match(r'^(```+|~~~+)', stripped)
                  if fence:
                      marker = fence.group(1)[0]
                      if not in_fence:
                          in_fence = True
                          fence_char = marker
                      elif marker == fence_char:
                          in_fence = False
                          fence_char = None
                      continue
                  if in_fence:
                      continue

                  match = re.match(r'^(#{1,6})[ \t]+(.+?)[ \t]*#*[ \t]*(?:\r?\n)?$', line)
                  if not match:
                      continue

                  level = len(match.group(1))
                  raw = match.group(2)
                  visible = strip_inline_markdown(raw)
                  base = github_slug_base(raw)
                  suffix = slug_counts[base]
                  slug_counts[base] += 1
                  slug = base if suffix == 0 else f"{base}-{suffix}"
                  records.append({
                      "index": index,
                      "level": level,
                      "raw": raw,
                      "visible": visible,
                      "slug": slug,
                  })
              return records

          def protect_and_replace(line: str, replacer) -> str:
              protected = re.compile(
                  r'(!?\[[^\]\n]+\]\([^)]+\)|`[^`\n]*`|<https?://[^>\n]+>|<[^>\n]+>)'
              )
              parts = protected.split(line)
              for idx in range(0, len(parts), 2):
                  parts[idx] = replacer(parts[idx])
              return ''.join(parts)

          def choose_toc_target(marker: str | None, content: str, records):
              visible = strip_inline_markdown(content)
              candidates = [visible]
              if marker:
                  number = re.sub(r'[.)]$', '', marker)
                  candidates = [
                      f"{number}. {visible}",
                      f"{number} {visible}",
                      visible,
                  ]

              exact = {record["visible"]: record for record in records}
              for candidate in candidates:
                  if candidate in exact:
                      return exact[candidate]

              normalised = {
                  re.sub(r'\s+', ' ', record["visible"]).strip().casefold(): record
                  for record in records
              }
              for candidate in candidates:
                  key = re.sub(r'\s+', ' ', candidate).strip().casefold()
                  if key in normalised:
                      return normalised[key]
              return None

          def add_toc_links(lines: list[str], records):
              changed = list(lines)
              contents = [
                  record for record in records
                  if record["visible"].casefold() in {"contents", "table of contents"}
              ]

              for contents_heading in contents:
                  start = contents_heading["index"] + 1
                  end = len(lines)
                  for record in records:
                      if record["index"] <= contents_heading["index"]:
                          continue
                      if record["level"] <= contents_heading["level"]:
                          end = record["index"]
                          break

                  for idx in range(start, end):
                      line = changed[idx]
                      if '](' in line or line.lstrip().startswith('#'):
                          continue

                      ordered = re.match(
                          r'^(\s*)(\d+[.)])(\s+)(.*?)(\s*(?:\r?\n)?)$', line
                      )
                      if ordered:
                          indent, marker, gap, content, ending = ordered.groups()
                          if not content.strip():
                              continue
                          target = choose_toc_target(marker, content, records)
                          if target:
                              changed[idx] = (
                                  f"{indent}{marker}{gap}[{content}](#{target['slug']}){ending}"
                              )
                          continue

                      bullet = re.match(
                          r'^(\s*[-*+]\s+)(.*?)(\s*(?:\r?\n)?)$', line
                      )
                      if bullet:
                          prefix, content, ending = bullet.groups()
                          if not content.strip():
                              continue
                          target = choose_toc_target(None, content, records)
                          if target:
                              changed[idx] = f"{prefix}[{content}](#{target['slug']}){ending}"

              return changed

          def add_section_references(lines: list[str], records):
              changed = list(lines)
              number_to_slug = {}
              for record in records:
                  match = re.match(r'^(\d+(?:\.\d+)*)(?:[.)])?(?:\s+|$)', record["visible"])
                  if match:
                      number_to_slug.setdefault(match.group(1), record["slug"])

              in_fence = False
              fence_char = None
              section_pattern = re.compile(
                  r'\b(Section|section)\s+(\d+(?:\.\d+)*)\b'
              )

              for idx, line in enumerate(changed):
                  stripped = line.lstrip()
                  fence = re.match(r'^(```+|~~~+)', stripped)
                  if fence:
                      marker = fence.group(1)[0]
                      if not in_fence:
                          in_fence = True
                          fence_char = marker
                      elif marker == fence_char:
                          in_fence = False
                          fence_char = None
                      continue
                  if in_fence or stripped.startswith('#'):
                      continue

                  def replace_segment(segment: str) -> str:
                      def replacement(match):
                          number = match.group(2)
                          slug = number_to_slug.get(number)
                          if not slug:
                              return match.group(0)
                          return f"[{match.group(0)}](#{slug})"
                      return section_pattern.sub(replacement, segment)

                  changed[idx] = protect_and_replace(line, replace_segment)

              return changed

          def added_internal_links(old: str, new: str):
              pattern = re.compile(r'\[([^\]]+)\]\(#([^)]+)\)')
              old_links = Counter(pattern.findall(old))
              new_links = Counter(pattern.findall(new))
              return new_links - old_links

          files = sorted(
              path for path in ROOT.rglob("*.md")
              if "templates" not in path.parts
              and "wireframes" not in path.parts
          )

          changed_files = []
          total_added = 0

          for path in files:
              old = path.read_text(encoding="utf-8")
              lines = old.splitlines(keepends=True)
              records = heading_records(lines)
              if not records:
                  continue

              revised_lines = add_toc_links(lines, records)
              revised_records = heading_records(revised_lines)
              revised_lines = add_section_references(revised_lines, revised_records)
              new = ''.join(revised_lines)

              if new == old:
                  continue

              if strip_all_links(new) != strip_all_links(old):
                  raise RuntimeError(f"Visible-text guard failed for {path}")

              final_records = heading_records(new.splitlines(keepends=True))
              valid_slugs = {record["slug"] for record in final_records}
              additions = added_internal_links(old, new)
              for (_, slug), count in additions.items():
                  if slug not in valid_slugs:
                      raise RuntimeError(
                          f"Invalid internal target #{slug} added {count} time(s) in {path}"
                      )

              path.write_text(new, encoding="utf-8")
              changed_files.append(str(path))
              total_added += sum(additions.values())

          if not changed_files:
              raise RuntimeError("Audit found no internal links to add")

          diff_names = subprocess.check_output(
              ["git", "diff", "--name-only"], text=True
          ).splitlines()
          unexpected = [
              name for name in diff_names
              if not (
                  name.startswith("docs/product/")
                  and name.endswith(".md")
              )
          ]
          if unexpected:
              raise RuntimeError(f"Unexpected files changed: {unexpected}")

          print(f"Changed {len(changed_files)} files; added {total_added} internal links")
          for path in changed_files:
              print(path)
          PY

      - name: Commit link-only documentation updates
        shell: bash
        run: |
          rm -f .github/workflows/internal-links-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: add internal documentation links"
          git push origin HEAD:docs/add-internal-document-links
