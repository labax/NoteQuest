name: Hyperlink-only documentation audit

on:
  push:
    branches:
      - docs/add-cross-document-hyperlinks

permissions:
  contents: write

jobs:
  audit-links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add cross-document hyperlinks only
        shell: bash
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import os
          import re
          from pathlib import Path

          root = Path("docs/product")

          targets: dict[str, str] = {
              "Digital Adaptation Feasibility Study": "digital-adaptation-feasibility-study.md",
              "Digital Adaptation Decision Register": "digital-adaptation-decision-register.md",
              "Original Decision Register": "digital-adaptation-decision-register.md",
              "Decision Register v0.2": "digital-adaptation-decision-register-v0.2.md",
              "Business Requirements Document v0.1": "business-requirements-v0.1.md",
              "Business Requirements Document": "business-requirements-v0.1.md",
              "MVP Scope v0.1": "mvp-scope-v0.1.md",
              "MVP Scope": "mvp-scope-v0.1.md",
              "Product Requirements Document v0.1": "product-requirements-v0.1.md",
              "Product Requirements Document": "product-requirements-v0.1.md",
              "Functional Requirements Document v0.1": "functional-requirements-v0.1.md",
              "Functional Requirements Document": "functional-requirements-v0.1.md",
              "Digital Rules Specification v0.1": "digital-rules-specification-v0.1.md",
              "Digital Rules Specification": "digital-rules-specification-v0.1.md",
              "Data Model / Domain Model Specification v0.1": "data-domain-model-v0.1.md",
              "Data Model / Domain Model Specification": "data-domain-model-v0.1.md",
              "UX Flow / Wireframe Requirements v0.1": "ux-flow-wireframe-requirements-v0.1.md",
              "UX Flow / Wireframe Requirements": "ux-flow-wireframe-requirements-v0.1.md",
              "Non-Functional Requirements v0.1": "non-functional-requirements-v0.1.md",
              "Non-Functional Requirements": "non-functional-requirements-v0.1.md",
              "Content & Licensing Requirements v0.1": "content-licensing-requirements-v0.1.md",
              "Content & Licensing Requirements": "content-licensing-requirements-v0.1.md",
              "Acceptance Criteria / Test Plan v0.1": "acceptance-criteria-test-plan-v0.1.md",
              "Acceptance Criteria / Test Plan": "acceptance-criteria-test-plan-v0.1.md",
              "Implementation and Release Decision Register v0.3": "implementation-release-decision-register-v0.3.md",
              "Implementation and Release Decision Register": "implementation-release-decision-register-v0.3.md",
              "Decision Register v0.3": "implementation-release-decision-register-v0.3.md",
              "Web Architecture, Offline Strategy and Hosting Plan v0.1": "web-architecture-offline-hosting-plan-v0.1.md",
              "Web Architecture, Offline Strategy and Hosting Plan": "web-architecture-offline-hosting-plan-v0.1.md",
              "Part D - Purpose, Sources, Context, Scope, and Strategy": "acceptance-criteria-test-plan-v0.1-part-d-strategy.md",
              "Part E - Test Levels, Environments, Data, Entry, and Exit": "acceptance-criteria-test-plan-v0.1-part-e-levels-environments.md",
              "Part F - Release Gates and Global Criteria": "acceptance-criteria-test-plan-v0.1-part-f-gates-global.md",
              "Appendix A - Feature-Level Acceptance Criteria": "acceptance-criteria-test-plan-v0.1-appendix-a-feature-criteria.md",
              "Appendix B - Detailed Acceptance Scenarios": "acceptance-criteria-test-plan-v0.1-appendix-b-scenarios.md",
              "Appendix C - Rules, Data, UX, and Content Matrices": "acceptance-criteria-test-plan-v0.1-appendix-c-matrices.md",
              "Part G - Regression, UAT, Defects, Traceability, Execution, Questions, and Approval": "acceptance-criteria-test-plan-v0.1-part-g-execution-approval.md",
          }

          protected_re = re.compile(
              r"!?\[[^\]\n]*\]\([^\n)]*\)"
              r"|!?\[[^\]\n]*\]\[[^\]\n]*\]"
              r"|`[^`\n]*`"
          )
          markdown_link_re = re.compile(r"!?\[([^\]\n]*)\]\([^\n)]*\)")
          reference_link_re = re.compile(r"!?\[([^\]\n]*)\]\[[^\]\n]*\]")

          def strip_link_markup(text: str) -> str:
              previous = None
              while previous != text:
                  previous = text
                  text = markdown_link_re.sub(lambda m: ("!" if m.group(0).startswith("!") else "") + m.group(1), text)
                  text = reference_link_re.sub(lambda m: ("!" if m.group(0).startswith("!") else "") + m.group(1), text)
              return text

          def link_plain_segment(segment: str, current: Path) -> str:
              for label, target_name in sorted(targets.items(), key=lambda item: len(item[0]), reverse=True):
                  target = root / target_name
                  if not target.exists() or current.resolve() == target.resolve():
                      continue
                  relative = os.path.relpath(target, start=current.parent).replace(os.sep, "/")
                  pattern = re.compile(r"(?<![\w\[])" + re.escape(label) + r"(?![\w\]])")
                  segment = pattern.sub(lambda m: f"[{m.group(0)}]({relative})", segment)
              return segment

          def process_line(line: str, current: Path) -> str:
              pieces: list[str] = []
              cursor = 0
              for match in protected_re.finditer(line):
                  pieces.append(link_plain_segment(line[cursor:match.start()], current))
                  pieces.append(match.group(0))
                  cursor = match.end()
              pieces.append(link_plain_segment(line[cursor:], current))
              return "".join(pieces)

          changed: list[tuple[str, int]] = []
          for path in sorted(root.rglob("*.md")):
              relative_parts = path.relative_to(root).parts
              if "templates" in relative_parts:
                  continue

              original = path.read_text(encoding="utf-8")
              lines = original.splitlines(keepends=True)
              output: list[str] = []
              in_fence = False
              fence_marker = ""

              for line in lines:
                  stripped = line.lstrip()
                  fence = re.match(r"(```+|~~~+)", stripped)
                  if fence:
                      marker = fence.group(1)[0]
                      if not in_fence:
                          in_fence = True
                          fence_marker = marker
                      elif marker == fence_marker:
                          in_fence = False
                          fence_marker = ""
                      output.append(line)
                      continue

                  output.append(line if in_fence else process_line(line, path))

              revised = "".join(output)
              if revised == original:
                  continue

              if strip_link_markup(revised) != strip_link_markup(original):
                  raise SystemExit(f"Visible text changed in {path}; refusing to continue")

              path.write_text(revised, encoding="utf-8")
              additions = revised.count("](") - original.count("](")
              changed.append((path.as_posix(), additions))

          if not changed:
              raise SystemExit("No missing cross-document hyperlinks were found")

          print("Hyperlink-only changes:")
          for path, count in changed:
              print(f"  {path}: +{count} links")
          print(f"Changed {len(changed)} Markdown files")
          PY

      - name: Remove temporary workflow and verify scope
        shell: bash
        run: |
          rm .github/workflows/hyperlink-audit.yml
          git diff -- docs/product
          test -z "$(git diff --name-only | grep -v '^docs/product/.*\.md$' | grep -v '^\.github/workflows/hyperlink-audit\.yml$' || true)"

      - name: Commit hyperlink-only audit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/product .github/workflows/hyperlink-audit.yml
          git commit -m "Add cross-document hyperlinks"
          git push origin HEAD:docs/add-cross-document-hyperlinks
