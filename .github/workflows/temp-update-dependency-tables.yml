name: Update BRD and MVP dependency tables

on:
  push:
    branches:
      - docs/update-brd-mvp-dependencies-after-ux
    paths:
      - .github/workflows/temp-update-dependency-tables.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/update-brd-mvp-dependencies-after-ux
          fetch-depth: 0

      - name: Update dependency rows
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('docs/product/business-requirements-v0.1.md'): {
                  '| DEP-006 | Data / Domain Model Specification | Technical | Persistence and content implementation | Pending |':
                  '| DEP-006 | [Data Model / Domain Model Specification v0.1](data-domain-model-v0.1.md) | Technical | Persistence and content implementation | Available; approved baseline |',
                  '| DEP-007 | UX Flow and Wireframe Requirements | UX | Responsive prototype and application design | Pending |':
                  '| DEP-007 | [UX Flow / Wireframe Requirements v0.1](ux-flow-wireframe-requirements-v0.1.md) | UX | Responsive prototype and application design | Available; approved baseline |',
              },
              Path('docs/product/mvp-scope-v0.1.md'): {
                  '| DEP-MVP-005 | Data / Domain Model Specification | Pending | Persistence, definitions, instances, import, and recovery |':
                  '| DEP-MVP-005 | [Data Model / Domain Model Specification v0.1](data-domain-model-v0.1.md) | Available; approved baseline | Persistence, definitions, instances, import, and recovery |',
                  '| DEP-MVP-006 | UX Flow and Wireframe Requirements | Pending | Responsive map, action states, accessibility, and estimation |':
                  '| DEP-MVP-006 | [UX Flow / Wireframe Requirements v0.1](ux-flow-wireframe-requirements-v0.1.md) | Available; approved baseline | Responsive map, action states, accessibility, and estimation |',
              },
          }

          for path, mapping in replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in mapping.items():
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(f'{path}: expected exactly one occurrence, found {count}: {old}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit focused documentation update
        shell: bash
        run: |
          rm -f .github/workflows/temp-update-dependency-tables.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/product/business-requirements-v0.1.md docs/product/mvp-scope-v0.1.md .github/workflows/temp-update-dependency-tables.yml
          git commit -m "docs: update BRD and MVP dependency tables [skip ci]"
          git push origin HEAD:docs/update-brd-mvp-dependencies-after-ux
