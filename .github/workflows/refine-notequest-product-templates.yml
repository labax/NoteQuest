name: Refine NoteQuest product templates

on:
  push:
    branches:
      - docs/remove-ironsworn-template-wording
    paths:
      - .github/workflows/refine-notequest-product-templates.yml

permissions:
  contents: write

jobs:
  refine-templates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply NoteQuest template refinements
        run: python .github/scripts/refine_notequest_templates.py

      - name: Remove temporary files and commit changes
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/refine-notequest-product-templates.yml
          rm -f .github/scripts/refine_notequest_templates.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "docs: refine NoteQuest-specific template examples"
          git push origin HEAD:docs/remove-ironsworn-template-wording
