name: Apply UX flow and Wireloom artifacts

on:
  push:
    branches:
      - docs/add-ux-flow-wireframes-v0.1
    paths:
      - .github/workflows/temp-apply-ux-wireframes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/add-ux-flow-wireframes-v0.1
          fetch-depth: 0

      - name: Decode documentation payload
        shell: bash
        run: |
          cat .github/ux-payload/uxx.part* > /tmp/ux_payload.b64
          base64 --decode /tmp/ux_payload.b64 > /tmp/ux_payload.tar.xz
          tar -xJf /tmp/ux_payload.tar.xz -C "$GITHUB_WORKSPACE"
          rm -f /tmp/ux_payload.b64 /tmp/ux_payload.tar.xz

      - name: Validate payload
        shell: bash
        run: |
          test -f docs/product/ux-flow-wireframe-requirements-v0.1.md
          test -f docs/product/wireframes/ux-v0.1/01-first-launch-desktop.wireloom
          test -f docs/product/wireframes/ux-v0.1/11-history-rule-trace-desktop.svg
          test "$(find docs/product/wireframes/ux-v0.1 -maxdepth 1 -name '*.wireloom' | wc -l)" -eq 11
          test "$(find docs/product/wireframes/ux-v0.1 -maxdepth 1 -name '*.svg' | wc -l)" -eq 11
          ! grep -R '{{' docs/product/ux-flow-wireframe-requirements-v0.1.md docs/product/wireframes/ux-v0.1

      - name: Commit UX specification and wireframes
        shell: bash
        run: |
          rm -rf .github/ux-payload
          rm -f .github/workflows/temp-apply-ux-wireframes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- docs/product/ux-flow-wireframe-requirements-v0.1.md docs/product/wireframes/ux-v0.1 .github/ux-payload .github/workflows/temp-apply-ux-wireframes.yml
          git commit -m "docs: add UX flow requirements and Wireloom wireframes [skip ci]"
          git push origin HEAD:docs/add-ux-flow-wireframes-v0.1
